name: Validate OpenViewer3D (No Build)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Show repository structure
      run: |
        echo "Checking OpenViewer3D structure..."
        ls -R

    - name: Validate core folders
      run: |
        test -d src/OpenViewer3D && echo "src OK"
        test -f README.md && echo "README OK"
        test -f LICENSE && echo "LICENSE OK"

    - name: Finish
      run: echo "Validation completed successfully"
